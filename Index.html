<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TradePulse</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- TOP BAR -->
  <div class="topbar">
    <h2>TradePulse</h2>
    <div id="balance">Balance: $10,000</div>
  </div>

  <!-- MARKET PRICE -->
  <div class="price-section">
    <h1 id="price">100.00</h1>
    <p>BTC / USDT (Demo Market)</p>
  </div>

  <!-- CHART PLACEHOLDER -->
  <div class="chart-box">
    <p>📊 Live Chart Area (Demo)</p>
  </div>

  <!-- TRADE BUTTONS -->
  <div class="trade-buttons">
    <button class="buy" onclick="trade('buy')">BUY</button>
    <button class="sell" onclick="trade('sell')">SELL</button>
  </div>

  <!-- TRADE HISTORY -->
  <div class="history">
    <h3>Trade History</h3>
    <ul id="trades"></ul>
  </div>

  <script src="script.js"></script>
</body>
</html>
